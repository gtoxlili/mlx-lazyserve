# mlx-lazyserve —— OpenAI 兼容本地 LLM 推理服务，反向代理（示例配置，占位符按需替换）
# 后端: http://mlx-host.tailnet.ts.net:41434 (Tailscale, Apple Silicon 上的 mlx-lazyserve)
# 链路: Client → Cloudflare (Full strict) → 本 nginx → Tailscale → mlx-host:41434
#
# 两点关键适配/修正：
#   1) 后端是 Tailscale MagicDNS 名（mlx-host.tailnet.ts.net），必须用「变量 +
#      resolver」在请求时按 TTL 解析。故这里不能用 upstream{} + keepalive 连接池
#      —— upstream 里的域名只在启动/reload 时解析一次，Tailscale IP 变更后会全员失联。
#   2) proxy_set_header / add_header 只要在某 location 里出现一条，同名「整组」就
#      不再从 server 继承。故把全套 header 都放 server 级、两个 location 一条 header
#      都不写 → 干净继承，避免在 /v1 location 只写 Early-Data 而把 Host/X-Forwarded
#      丢掉的那个坑。
#
# 鉴权: 服务侧 Bearer token（Authorization 头由 nginx 默认透传）。
# 证书: 复用 *.example.com 的 cf-origin 证书。
#
# ⚠️ Cloudflare 代理首字节 ~100s 超时(524)：
#    - 流式 (stream:true) 首 chunk 很快到 → 不受影响（推荐）。
#    - 长非流式 (stream:false) 整段 >100s 会被 CF 524 → 该子域走灰云(DNS only)/Tunnel 绕开。

server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    http3 on;
    server_name mlx.example.com;        # ← 改成你的子域；需在 CF 加对应 DNS 记录

    ssl_certificate cert/cf-origin.pem;
    ssl_certificate_key cert/cf-origin.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_MLX:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_conf_command Options KTLS;
    ssl_early_data on;
    quic_retry on;
    # CF Origin Cert 不在公共 CA 链，stapling 关掉。

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header QUIC-Status $http3 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # Tailscale MagicDNS：变量 + resolver，按 TTL 刷新 upstream IP。
    set $mlx_upstream "mlx-host.tailnet.ts.net";   # ← 改成你的 Tailscale MagicDNS 名
    resolver 100.100.100.100 valid=300s ipv6=off;
    resolver_timeout 5s;

    # 视觉模型可能带 base64 图片，放宽 body 上限（覆盖全局 10m）。
    client_max_body_size 25m;

    # ── 公共代理参数（全部放 server 级；下面 location 不写任何 header → 整组干净继承）──
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection $connection_upgrade;   # nginx.conf 已 map：非 WS 时为空，利于 keepalive
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Early-Data $ssl_early_data;
    proxy_set_header Accept-Encoding "";                # 避免后端压缩后 nginx 再压一次
    # Authorization 头由 nginx 默认透传，服务靠它做 Bearer 鉴权。

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ── /v1/* —— OpenAI 兼容推理。SSE 流式关键：禁缓冲 + 禁压缩 + 长超时 ──
    # 压缩(br/gzip)会强制缓冲、毁掉逐 token 输出，必须在这块显式关掉
    # （全局 nginx.conf 对 application/json 默认开着压缩）。
    location /v1/ {
        proxy_pass http://$mlx_upstream:41434;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        brotli off;
        gzip off;

        # 单次生成可能数分钟（思考型 + 默认 8192 tokens + 首次加载模型）。
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── 其余（/admin/maintenance、/health）—— 快 JSON，走 server 级默认缓冲/超时 ──
    location / {
        proxy_pass http://$mlx_upstream:41434;
    }
}
