# Model registry for mlx-lazyserve.
# Friendly name -> Hugging Face MLX repo. Weights download lazily on first use
# (cached in ~/.cache/huggingface) and unload after the idle timeout.
#
#   engine = "auto"     try mlx-lm, fall back to mlx-vlm  (good default)
#            "mlx_lm"   force the text engine
#            "mlx_vlm"  force the vision-language engine (required for image input)

# --- Main daily driver: comfortable on 24 GB, strongest for agent / code / text ---
[models."gemma4-26b-uncensored"]
# SuperGemma4 26B-A4B (MoE, ~3.8B active), uncensored, MLX 4-bit, ~14.2 GB.
# Text-only build (best benchmarks), tuned for Apple Silicon.
repo = "Jiunsong/supergemma4-26b-uncensored-mlx-4bit-v2"
engine = "auto"
default = true

# --- Main heavy hitter: tight on 24 GB; raise iogpu.wired_limit_mb (~22000) + modest context ---
[models."qwen3.6-35b-a3b"]
# Qwen 3.6 35B-A3B (MoE, ~3B active), "Heretic" abliteration, MLX, ~18.7 GB.
# The idle-unload frees this ~19 GB when not in use.
repo = "TheCluster/Qwen3.6-35B-A3B-Heretic-MLX-mixed-3.9bit"
engine = "auto"

# --- Lightweight fallback: ~5 GB, always loads, fast, leaves headroom ---
[models."qwen3.5-9b"]
# HauhauCS Aggressive uncensored, community MLX conversion (mxfp4).
repo = "TheCluster/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-MLX-mxfp4"
engine = "auto"
