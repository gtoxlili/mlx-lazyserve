# Model registry for mlx-lazyserve.
# Friendly name -> Hugging Face MLX repo. Weights download lazily on first use
# (cached in ~/.cache/huggingface) and unload after the idle timeout.
#
#   engine = "auto"     try mlx-lm, fall back to mlx-vlm  (good default)
#            "mlx_lm"   force the text engine
#            "mlx_vlm"  force the vision-language engine (required for image input)
#   context = 32768     context window in tokens (default 8192). The Telegram bot trims
#                       old history so the prompt + reserved output stay within this.
#   enable_thinking = true      API reasoning default for this model (default false); a
#                               per-request enable_thinking still overrides it.
#   tg_enable_thinking = true   Telegram-bot reasoning default (default false); a user's
#                               /think toggle still overrides it. Independent of enable_thinking.

# --- Main daily driver: comfortable on 24 GB, strongest for agent / code / text ---
[models."gemma4-26b-uncensored"]
# SuperGemma4 26B-A4B (MoE, ~3.8B active), uncensored, MLX 4-bit, ~14.2 GB.
# Text-only build (best benchmarks), tuned for Apple Silicon.
repo = "Jiunsong/supergemma4-26b-uncensored-mlx-4bit-v2"
engine = "auto"
# 256k-capable. Sliding-window attention (25 of 30 layers, window 1024) keeps KV cheap —
# only 5 full-attn layers grow with context — so ~96k fits 24 GB (~4 GB KV) with margin.
context = 98304

# --- Main heavy hitter: tight on 24 GB; raise iogpu.wired_limit_mb (~22000) + modest context ---
[models."qwen3.6-35b-a3b"]
# Qwen 3.6 35B-A3B (MoE, ~3B active), "Heretic" abliteration, MLX, ~18.7 GB.
# The idle-unload frees this ~19 GB when not in use.
repo = "TheCluster/Qwen3.6-35B-A3B-Heretic-MLX-mixed-3.9bit"
engine = "auto"
# 256k-capable, but RAM-bound here: ~18.7 GB of weights leave only ~2 GB for KV on 24 GB,
# so ~32k (8-bit KV ~1.3 GB) is the safe ceiling. Going higher needs a smaller quant.
context = 32768

# --- Lightweight fallback: ~5 GB, always loads, fast, leaves headroom ---
[models."qwen3.5-9b"]
# HauhauCS Aggressive uncensored, community MLX conversion (mxfp4).
repo = "TheCluster/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-MLX-mxfp4"
engine = "auto"
# 256k-capable; only ~5 GB of weights leaves lots of room. With 8-bit KV, 128k ≈ 8.6 GB KV
# fits comfortably (could push ~192k).
context = 131072

# --- New Qwythos/Claude Mythos reasoning tune: text-only 4-bit MLX, ~4.8 GB ---
[models."qwythos-9b"]
# Community mxfp4 MLX conversion of empero-ai/Qwythos-9B-Claude-Mythos-5-1M.
# Only 8/32 layers use full attention, so KV grows slowly. Bot default is 4-bit KV:
# 512k ≈ 4 GiB KV; 1M fits on paper but makes huge-paste prefill too easy to trigger.
repo = "sahilchachra/Qwythos-9B-Claude-Mythos-5-1M-mxfp4-mlx"
engine = "mlx_lm"
context = 524288

# --- Default small Fable coder/agent model: MiniCPM5-1B (Llama arch), MLX 8-bit ---
[models."cpmopus-fable5-1b"]
# MiniCPM5-1B-Claude-Opus-Fable5-Thinking — a 1B Llama-arch reasoning/coding tune (Opus
# Fable5 data, Qwen3-style <think> mode). No MLX build existed upstream (only GGUF), so
# converted from the safetensors checkpoint to 8-bit MLX (~1.1 GB, near-lossless, ~100+
# tok/s on M4 Pro) and published to the Hub. Regenerate with:
#   mlx_lm.convert --hf-path GnLOLot/MiniCPM5-1B-Claude-Opus-Fable5-Thinking -q --q-bits 8
repo = "gtoxlili/MiniCPM5-1B-Claude-Opus-Fable5-Thinking-MLX-8bit"
engine = "mlx_lm"
default = true
# Thinking on by default on both surfaces — a 1B leans on chain-of-thought to punch above
# its size. (A per-request enable_thinking / the bot's /think toggle still override these.)
enable_thinking = true       # API default
tg_enable_thinking = true    # Telegram-bot default
# 128k (131072) is the model's max supported context: max_position_embeddings, and the model
# card states "Context Length: 131,072" with no rope-scaling/YaRN to extend it. So this is the
# real ceiling — anything higher would just be RoPE extrapolation past what it was built for.
context = 131072
